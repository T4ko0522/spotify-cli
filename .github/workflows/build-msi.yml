name: Build MSI Installer

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build spty.exe
        run: go build -o installer/spty.exe .

      - name: Install WiX v5
        run: dotnet tool install --global wix

      - name: Build MSI
        run: wix build installer/spty.wxs -o installer/spty.msi

      - uses: actions/upload-artifact@v4
        with:
          name: spty-msi
          path: installer/spty.msi
