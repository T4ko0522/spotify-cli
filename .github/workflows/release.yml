name: Release

on:
  workflow_dispatch:

permissions: {}

jobs:
  version:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 5
    outputs:
      version: ${{ steps.read.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Read version from go.mod
        id: read
        run: |
          version=$(grep '^// AppVersion ' go.mod | awk '{print $3}')
          if [ -z "$version" ]; then
            echo "::error::AppVersion not found in go.mod"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

  build-linux:
    needs: version
    permissions:
      contents: read
    timeout-minutes: 20
    strategy:
      matrix:
        goarch: [amd64, arm64]
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.version.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          go build -trimpath -ldflags="-s -w" -o dist/spt .

      - name: Create archive
        run: |
          cd dist
          tar czf "spt-${VERSION}-linux-${{ matrix.goarch }}.tar.gz" spt

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: spt-linux-${{ matrix.goarch }}
          path: dist/spt-${{ env.VERSION }}-linux-${{ matrix.goarch }}.tar.gz

  build-msi:
    needs: version
    permissions:
      contents: read
    timeout-minutes: 30
    runs-on: windows-latest
    env:
      VERSION: ${{ needs.version.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Build spt.exe
        run: go build -trimpath -ldflags="-s -w" -o installer/spt.exe .

      - name: Install WiX v5
        run: dotnet tool install --global wix

      - name: Prepare MSI version
        id: msi-ver
        shell: pwsh
        run: |
          $v = "${{ env.VERSION }}" -replace '^v', ''
          $parts = $v -split '\.'
          while ($parts.Count -lt 4) { $parts += '0' }
          $msiVer = ($parts[0..3]) -join '.'
          echo "msi_version=$msiVer" >> $env:GITHUB_OUTPUT

      - name: Build MSI
        run: wix build installer/spt.wxs -o installer/spt-${{ env.VERSION }}.msi -b installer -d Version=${{ steps.msi-ver.outputs.msi_version }}

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: spt-windows-msi
          path: installer/spt-${{ env.VERSION }}.msi

  release:
    needs: [version, build-linux, build-msi]
    permissions:
      contents: write
    timeout-minutes: 10
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.version.outputs.version }}
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ env.VERSION }}
          name: ${{ env.VERSION }}
          files: artifacts/*
          draft: false
          prerelease: false
          overwrite_files: true
